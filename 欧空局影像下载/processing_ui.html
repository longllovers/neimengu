<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>影像合并裁剪</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-2: #f3f4f6;
      --line: #d9dee7;
      --text: #172033;
      --muted: #667085;
      --accent: #2563eb;
      --accent-2: #1d4ed8;
      --success: #059669;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    .page { width: min(1320px, calc(100% - 32px)); margin: 28px auto; }
    header { display: flex; align-items: end; justify-content: space-between; gap: 20px; margin-bottom: 20px; }
    h1 { margin: 0; font-size: 28px; letter-spacing: .02em; }
    .subtitle { margin: 7px 0 0; color: var(--muted); }
    .badge { padding: 7px 12px; border: 1px solid var(--line); border-radius: 999px; color: var(--muted); background: #fff; }
    .layout { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(420px, .9fr); gap: 18px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 10px 28px rgba(15,23,42,.07); }
    .form-card { padding: 20px; }
    .section { padding: 18px 0; border-bottom: 1px solid var(--line); }
    .section:first-child { padding-top: 0; }
    .section:last-child { border-bottom: 0; padding-bottom: 0; }
    .section-title { margin: 0 0 13px; font-size: 16px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
    .field.full { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 13px; }
    input[type="text"], input[type="number"] {
      width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 11px 12px;
      background: #fff; color: var(--text); outline: none;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56,189,248,.13); }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    button {
      border: 0; border-radius: 9px; padding: 10px 15px; cursor: pointer; font-weight: 650;
      background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent-2); border-color: var(--accent-2); color: #fff; }
    button.run { min-width: 150px; background: #059669; border-color: #059669; color: #fff; }
    .check-row { display: flex; align-items: center; gap: 8px; color: var(--text); }
    .check-row label { margin: 0; color: var(--text); }
    .cities {
      margin-top: 12px; min-height: 82px; max-height: 230px; overflow-y: auto;
      padding: 10px; border: 1px solid var(--line); border-radius: 9px; background: #fafbfc;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 7px;
    }
    .city-item { display: flex; align-items: center; gap: 7px; padding: 5px; font-size: 14px; }
    .empty { color: var(--muted); grid-column: 1 / -1; }
    .log-card { display: flex; flex-direction: column; min-height: 700px; overflow: hidden; }
    .log-head { padding: 15px 17px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .log-head h2 { margin: 0; font-size: 16px; }
    #logOutput {
      flex: 1; min-height: 0; max-height: 760px; margin: 0; padding: 16px;
      overflow: auto; white-space: pre-wrap; overflow-wrap: anywhere;
      color: #263445; background: #fbfcfe; font: 13px/1.62 Consolas, "Cascadia Mono", monospace;
      scrollbar-color: #aab4c3 #eef1f5; scrollbar-width: thin;
    }
    .hint { color: var(--muted); font-size: 12px; line-height: 1.55; }
    .run-status { min-width: 76px; font-size: 14px; font-weight: 650; color: var(--muted); }
    .run-status.running { color: #2563eb; }
    .run-status.done { color: #059669; }
    .run-status.error { color: #dc2626; }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .log-card { min-height: 500px; }
      #logOutput { max-height: 560px; }
    }
    @media (max-width: 620px) { .grid { grid-template-columns: 1fr; } .field.full { grid-column: auto; } }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>影像合并裁剪</h1>
        <p class="subtitle">市级合并完成后，自动衔接对应城市的县级裁剪。</p>
      </div>
      <div class="badge" id="statusBadge">服务已连接</div>
    </header>

    <div class="layout">
      <section class="card form-card">
        <div class="section">
          <h2 class="section-title">1. 挂载硬盘</h2>
          <div class="actions">
            <button id="mountButton" type="button">挂载新硬盘</button>
            <span class="hint">点击后请插入新硬盘；挂载脚本的输出会显示在右侧。</span>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">2. 路径设置</h2>
          <div class="grid">
            <div class="field full">
              <label for="sourcePath">来源影像路径（下面是各市文件夹）</label>
              <input id="sourcePath" type="text" placeholder="挂载成功后自动填入挂载根路径，再手工补充来源子目录">
            </div>
            <div class="field full">
              <label for="cityOutputPath">市级合并影像保存路径</label>
              <input id="cityOutputPath" type="text" placeholder="挂载成功后自动填入挂载根路径，再手工补充市级输出子目录">
            </div>
            <div class="field full">
              <label for="countyOutputPath">县级裁剪影像保存路径</label>
              <input id="countyOutputPath" type="text" placeholder="挂载成功后自动填入挂载根路径，再手工补充县级输出子目录">
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">3. 选择城市</h2>
          <div class="actions">
            <button id="loadCitiesButton" type="button">列出所有城市</button>
            <div class="check-row">
              <input id="selectAll" type="checkbox">
              <label for="selectAll">选择全部</label>
            </div>
            <span class="hint" id="cityCount">尚未扫描</span>
          </div>
          <div class="cities" id="cityList"><div class="empty">请先填写来源路径，再点击“列出所有城市”。</div></div>
        </div>

        <div class="section">
          <h2 class="section-title">4. 运行参数</h2>
          <div class="grid">
            <div class="field">
              <label for="cityWorkers">市级合并 max-workers</label>
              <input id="cityWorkers" type="number" value="1" min="1" max="32">
            </div>
            <div class="field">
              <label for="countyWorkers">县级裁剪 max-workers</label>
              <input id="countyWorkers" type="number" value="1" min="1" max="32">
            </div>
            <div class="check-row">
              <input id="cityOverwrite" type="checkbox">
              <label for="cityOverwrite">覆盖已有市级影像</label>
            </div>
            <div class="check-row">
              <input id="countyOverwrite" type="checkbox">
              <label for="countyOverwrite">覆盖已有县级影像</label>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="actions">
            <button class="run" id="runButton" type="button">运行处理任务</button>
            <span class="run-status" id="runStatus"></span>
            <span class="hint">输出目录不存在时由服务端自动创建。</span>
          </div>
        </div>
      </section>

      <aside class="card log-card">
        <div class="log-head">
          <h2>运行提示信息</h2>
          <button id="clearLogButton" type="button">清空显示</button>
        </div>
        <pre id="logOutput">等待任务……
</pre>
      </aside>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const logOutput = $("logOutput");
    let lastLogId = 0;
    let lastMountVersion = 0;
    let waitingForCompletion = false;
    let previousPipelineRunning = false;

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: {"Content-Type": "application/json"},
        ...options,
      });
      const data = await response.json();
      if (!response.ok || !data.ok) throw new Error(data.error || `HTTP ${response.status}`);
      return data;
    }

    function showError(error) {
      alert(error instanceof Error ? error.message : String(error));
    }

    $("mountButton").addEventListener("click", async () => {
      try {
        const data = await api("/api/mount", {method: "POST", body: "{}"});
        alert(data.message);
      } catch (error) { showError(error); }
    });

    $("loadCitiesButton").addEventListener("click", async () => {
      try {
        const data = await api("/api/cities", {
          method: "POST",
          body: JSON.stringify({source_path: $("sourcePath").value.trim()}),
        });
        const list = $("cityList");
        list.replaceChildren();
        for (const city of data.cities) {
          const item = document.createElement("label");
          item.className = "city-item";
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.className = "city-checkbox";
          checkbox.value = city;
          const text = document.createElement("span");
          text.textContent = city;
          item.append(checkbox, text);
          list.append(item);
        }
        if (!data.cities.length) list.innerHTML = '<div class="empty">没有找到城市文件夹。</div>';
        $("cityCount").textContent = `共 ${data.count} 个城市`;
        $("selectAll").checked = false;
      } catch (error) { showError(error); }
    });

    $("selectAll").addEventListener("change", (event) => {
      document.querySelectorAll(".city-checkbox").forEach((box) => { box.checked = event.target.checked; });
    });

    $("runButton").addEventListener("click", async () => {
      logOutput.textContent = "";
      const cities = [...document.querySelectorAll(".city-checkbox:checked")].map((box) => box.value);
      const payload = {
        source_path: $("sourcePath").value.trim(),
        city_output_path: $("cityOutputPath").value.trim(),
        county_output_path: $("countyOutputPath").value.trim(),
        cities,
        city_workers: Number($("cityWorkers").value),
        county_workers: Number($("countyWorkers").value),
        city_overwrite: $("cityOverwrite").checked,
        county_overwrite: $("countyOverwrite").checked,
      };
      try {
        const data = await api("/api/run", {method: "POST", body: JSON.stringify(payload)});
        waitingForCompletion = true;
        previousPipelineRunning = true;
        $("runStatus").textContent = "正在运行";
        $("runStatus").className = "run-status running";
      } catch (error) {
        $("runStatus").textContent = `启动失败：${error instanceof Error ? error.message : String(error)}`;
        $("runStatus").className = "run-status error";
      }
    });

    $("clearLogButton").addEventListener("click", () => { logOutput.textContent = ""; });

    async function pollLogs() {
      try {
        const data = await api(`/api/logs?after=${lastLogId}`);
        const nearBottom = logOutput.scrollHeight - logOutput.scrollTop - logOutput.clientHeight < 80;
        if (data.logs.length) {
          const text = data.logs.map((item) => item.message).join("\n") + "\n";
          logOutput.append(document.createTextNode(text));
          lastLogId = data.newest;
          if (nearBottom) logOutput.scrollTop = logOutput.scrollHeight;
        }
        if (data.mount_path && data.mount_version > lastMountVersion) {
          $("sourcePath").value = data.mount_path;
          $("cityOutputPath").value = data.mount_path;
          $("countyOutputPath").value = data.mount_path;
          lastMountVersion = data.mount_version;
          alert(`挂载成功，已写入挂载路径：${data.mount_path}\n请在三个输入框后继续补充子目录。`);
        }
        $("statusBadge").textContent = data.pipeline_running
          ? "影像任务运行中"
          : data.mount_running ? "等待挂载硬盘" : "服务空闲";
        if (waitingForCompletion && previousPipelineRunning && !data.pipeline_running) {
          waitingForCompletion = false;
          $("runStatus").textContent = "运行完成";
          $("runStatus").className = "run-status done";
        }
        previousPipelineRunning = data.pipeline_running;
      } catch (error) {
        $("statusBadge").textContent = "服务连接异常";
      } finally {
        window.setTimeout(pollLogs, 1000);
      }
    }
    pollLogs();
  </script>
</body>
</html>
